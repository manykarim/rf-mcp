name: E2E with Real LLM

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Allow manual triggering

jobs:
  e2e-copilot-autonomous:
    name: E2E Copilot Autonomous Agent Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      COPILOT_MODEL: ${{ vars.COPILOT_MODEL }}

    steps:
      - name: Check Copilot token
        run: |
          if [ -z "$COPILOT_GITHUB_TOKEN" ]; then
            echo "::warning::PERSONAL_ACCESS_TOKEN secret not set — skipping Copilot autonomous tests"
            echo "SKIP_COPILOT=true" >> "$GITHUB_ENV"
          fi

      - name: Checkout repository
        if: env.SKIP_COPILOT != 'true'
        uses: actions/checkout@v4

      - name: Setup uv
        if: env.SKIP_COPILOT != 'true'
        uses: astral-sh/setup-uv@v2
        with:
          version: 'latest'

      - name: Setup Python 3.12 (via uv)
        if: env.SKIP_COPILOT != 'true'
        run: uv python install 3.12

      - name: Install dependencies (dev)
        if: env.SKIP_COPILOT != 'true'
        run: uv sync --all-extras --group dev

      - name: Setup Node.js
        if: env.SKIP_COPILOT != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI
        if: env.SKIP_COPILOT != 'true'
        run: npm install -g @github/copilot

      - name: Verify Copilot CLI
        if: env.SKIP_COPILOT != 'true'
        run: copilot --version

      - name: Create metrics and results directories
        if: env.SKIP_COPILOT != 'true'
        run: mkdir -p tests/e2e/metrics/copilot_autonomous results

      - name: Run Copilot autonomous agent tests
        if: env.SKIP_COPILOT != 'true'
        run: |
          uv run pytest tests/e2e/test_copilot_autonomous_agents.py -v -m copilot_cli --junitxml=results/copilot-autonomous.xml
        continue-on-error: true
        timeout-minutes: 25

      - name: Upload Copilot autonomous metrics
        if: env.SKIP_COPILOT != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-copilot-autonomous-metrics
          path: tests/e2e/metrics/copilot_autonomous/**/*.json

      - name: Test Report
        uses: dorny/test-reporter@main
        if: env.SKIP_COPILOT != 'true' && (success() || failure())
        with:
          name: E2E Autonomous Tests (Copilot)
          path: results/copilot-autonomous.xml
          reporter: java-junit

  model-comparison:
    name: Copilot Model Comparison Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      COPILOT_MODEL: ${{ vars.COPILOT_MODEL }}
      COPILOT_COMPARISON_MODELS: "gpt-5-mini,gpt-5.4-mini,claude-haiku-4.5"

    steps:
      - name: Check Copilot token
        run: |
          if [ -z "$COPILOT_GITHUB_TOKEN" ]; then
            echo "::warning::PERSONAL_ACCESS_TOKEN secret not set — skipping Copilot model comparison tests"
            echo "SKIP_COPILOT=true" >> "$GITHUB_ENV"
          fi

      - name: Checkout repository
        if: env.SKIP_COPILOT != 'true'
        uses: actions/checkout@v4

      - name: Setup uv
        if: env.SKIP_COPILOT != 'true'
        uses: astral-sh/setup-uv@v2
        with:
          version: 'latest'

      - name: Setup Python 3.12 (via uv)
        if: env.SKIP_COPILOT != 'true'
        run: uv python install 3.12

      - name: Install dependencies (dev)
        if: env.SKIP_COPILOT != 'true'
        run: uv sync --all-extras --group dev

      - name: Setup Node.js
        if: env.SKIP_COPILOT != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Copilot CLI
        if: env.SKIP_COPILOT != 'true'
        run: npm install -g @github/copilot

      - name: Verify Copilot CLI
        if: env.SKIP_COPILOT != 'true'
        run: copilot --version

      - name: Create metrics and results directories
        if: env.SKIP_COPILOT != 'true'
        run: mkdir -p tests/e2e/metrics/copilot_model_comparison results

      - name: Run Copilot model comparison tests
        if: env.SKIP_COPILOT != 'true'
        run: |
          uv run pytest tests/e2e/test_copilot_model_comparison.py -v -m copilot_cli --junitxml=results/copilot-model-comparison.xml
        continue-on-error: true
        timeout-minutes: 35

      - name: Upload model comparison metrics
        if: env.SKIP_COPILOT != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: copilot-model-comparison-metrics
          path: tests/e2e/metrics/copilot_model_comparison/**/*.json

      - name: Test Report
        uses: dorny/test-reporter@main
        if: env.SKIP_COPILOT != 'true' && (success() || failure())
        with:
          name: Model Comparison Tests (Copilot)
          path: results/copilot-model-comparison.xml
          reporter: java-junit

  opencode-e2e:
    name: OpenCode E2E (Small LLMs via OpenRouter)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENCODE_MODELS: 'openrouter/qwen/qwen3-coder,openrouter/z-ai/glm-4.5-air'
      RUN_INTENT_E2E: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install opencode CLI
        run: npm install -g opencode-ai

      - name: Verify opencode
        run: opencode --version

      - name: Setup uv
        uses: astral-sh/setup-uv@v2
        with:
          version: 'latest'

      - name: Setup Python 3.12 (via uv)
        run: uv python install 3.12

      - name: Install dependencies (dev)
        run: uv sync --all-extras --group dev

      - name: Create metrics directories
        run: |
          mkdir -p tests/e2e/metrics/intent_action
          mkdir -p tests/e2e/metrics/realistic_e2e
          mkdir -p results

      - name: Run Intent Action E2E Tests (pytest)
        run: |
          uv run pytest tests/e2e/test_intent_action_models.py -v \
            --junitxml=results/e2e-intent-action.xml
        timeout-minutes: 20
        continue-on-error: true

      - name: Run Realistic E2E Tests (standalone)
        run: uv run python tests/e2e/run_realistic_e2e.py
        timeout-minutes: 50
        continue-on-error: true

      - name: Upload opencode E2E metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencode-e2e-metrics
          path: |
            tests/e2e/metrics/intent_action/**/*.json
            tests/e2e/metrics/realistic_e2e/**/*.json

      - name: Test Report
        uses: dorny/test-reporter@main
        if: success() || failure()
        with:
          name: OpenCode Intent Action E2E
          path: results/e2e-intent-action.xml
          reporter: java-junit
